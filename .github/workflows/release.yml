name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.3.0) — dry-run only, no upload"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mipsel-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            build_std: true
            toolchain: nightly
            cargo_flags: --no-default-features --features full
            use_cross: true
          - target: mips-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            build_std: true
            toolchain: nightly
            cargo_flags: --no-default-features --features full
            use_cross: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust toolchain
        shell: bash
        run: |
          TOOLCHAIN="${{ matrix.toolchain || 'stable' }}"
          rustup toolchain install "$TOOLCHAIN" --profile minimal --no-self-update
          rustup default "$TOOLCHAIN"
          if [ "${{ matrix.build_std }}" = "true" ]; then
            rustup component add rust-src --toolchain "$TOOLCHAIN"
          else
            rustup target add "${{ matrix.target }}" --toolchain "$TOOLCHAIN"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross@0.2.5

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_STD=""
            if [ "${{ matrix.build_std }}" = "true" ]; then
              BUILD_STD="-Zbuild-std=std,panic_abort"
            fi
            cross build --release --locked ${{ matrix.cargo_flags }} $BUILD_STD --target ${{ matrix.target }} --bin meow
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cargo zigbuild --release --locked ${{ matrix.cargo_flags }} --target ${{ matrix.target }} --bin meow
          else
            cargo build --release --locked ${{ matrix.cargo_flags }} --target ${{ matrix.target }} --bin meow
          fi

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          name="meow-${ref}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/meow" "${staging}/"
          cp README.md LICENSE "${staging}/" 2>/dev/null || true
          tar -C dist -czf "${name}.tar.gz" "${name}"
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meow-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          generate_release_notes: true
